services:
  - type: web
    name: colloexpress
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_SSL
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
